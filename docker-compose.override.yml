# Host-specific overrides (not committed). On this shared box another project
# already binds host port 3000, so expose the relayer on 3300 instead. Prometheus
# scrapes the relayer over the internal docker network (relayer:3000), so the host
# port is for manual access only and this remap does not affect functionality.
services:
  relayer:
    # !override replaces the base ports list instead of appending to it.
    ports: !override
      - "3300:3000"

  # Expose the dedicated bosphor Postgres on a free host port for admin access.
  # The relayer reaches it over the internal docker network (postgres:5432); this
  # host mapping is for manual psql only. 5432-5434 are taken by other projects.
  postgres:
    ports:
      - "5435:5432"
