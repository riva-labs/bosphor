name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  forge-tests:
    name: Forge Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run forge tests
        run: forge test -vvv
        working-directory: contracts/evm

  move-tests:
    name: Move Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Sui CLI
        id: cache-sui
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/sui
          key: sui-cli-${{ runner.os }}-testnet-v1.72.2

      - name: Install Sui CLI
        if: steps.cache-sui.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/sui-install
          curl -fsSL "https://github.com/MystenLabs/sui/releases/download/testnet-v1.72.2/sui-testnet-v1.72.2-ubuntu-x86_64.tgz" -o /tmp/sui-install/sui.tgz
          tar -xzf /tmp/sui-install/sui.tgz -C /tmp/sui-install ./sui
          sudo mv /tmp/sui-install/sui /usr/local/bin/sui

      - name: Run Move tests
        run: sui move test --build-env testnet
        working-directory: sui/lz-receiver

  relayer-build-and-test:
    name: Relayer Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: relayer/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: relayer

      - name: Build
        run: npm run build
        working-directory: relayer

      - name: Test
        run: npm test
        working-directory: relayer
