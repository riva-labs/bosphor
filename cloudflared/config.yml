# Cloudflare Tunnel config for the public Bosphor relayer API.
#
# The tunnel connects OUTBOUND to the Cloudflare edge, so no inbound port is
# opened on the VPS and other host services (walrus-portal on :80, Grafana) are
# untouched. The relayer runs in docker mapped to host port 3300
# (bosphor-relayer-1: 3300->3000).
#
# Secrets are NOT in this file: the tunnel credentials JSON and the account
# cert.pem live in ~/.cloudflared on the host (gitignored, mounted read-only
# into the cloudflared container at /etc/cloudflared). See README.md.
tunnel: 2bc9d726-211c-439c-9ee6-16b45c6414c5
credentials-file: /etc/cloudflared/2bc9d726-211c-439c-9ee6-16b45c6414c5.json

ingress:
  - hostname: api.bosphor.xyz
    service: http://localhost:3300
  # Public status page (Kener container, host port 3008). Rollback = 3002 (Kuma).
  - hostname: status.bosphor.xyz
    service: http://localhost:3008
  - service: http_status:404
