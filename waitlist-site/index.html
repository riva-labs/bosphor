<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bosphor — Early Access</title>
    <meta name="description" content="Join the Bosphor developer waitlist. Making Permanence Portable." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --navy: #1a1c24;
        --blue: #3a7aaf;
        --blue-dark: #28577c;
        --bg: #f7f6f3;
        --surface: #ffffff;
        --muted: #5c5f6e;
        --green: #2f9e6b;
        --red: #c0492f;
        --border: #e4e2dc;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: 'Instrument Sans', system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--navy);
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        max-width: 460px;
        width: 100%;
        padding: 44px 38px;
        box-shadow: 0 8px 30px rgba(26, 28, 36, 0.06);
      }
      .kicker {
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--blue);
        font-weight: 600;
        margin: 0 0 12px;
      }
      h1 { font-size: 27px; line-height: 1.25; margin: 0 0 10px; font-weight: 600; }
      .lede { color: var(--muted); font-size: 15px; line-height: 1.55; margin: 0 0 28px; }
      form { display: flex; flex-direction: column; gap: 12px; }
      input[type='email'] {
        font-family: inherit;
        font-size: 15px;
        padding: 13px 14px;
        border: 1px solid var(--border);
        border-radius: 10px;
        outline: none;
        transition: border-color 0.15s;
      }
      input[type='email']:focus { border-color: var(--blue); }
      button {
        font-family: inherit;
        font-size: 15px;
        font-weight: 600;
        color: #fff;
        background: var(--blue);
        border: 0;
        border-radius: 10px;
        padding: 13px 16px;
        cursor: pointer;
        transition: background 0.15s;
      }
      button:hover { background: var(--blue-dark); }
      button:disabled { opacity: 0.6; cursor: default; }
      .msg { font-size: 14px; margin: 14px 0 0; min-height: 20px; }
      .msg.ok { color: var(--green); }
      .msg.err { color: var(--red); }
      .foot { margin-top: 26px; font-size: 13px; color: var(--muted); display: flex; justify-content: space-between; }
      .foot a { color: var(--blue); text-decoration: none; }
      .count { font-variant-numeric: tabular-nums; }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="kicker">Making Permanence Portable</p>
      <h1>Get early access to Bosphor</h1>
      <p class="lede">
        Cross-chain storage intent routing to Walrus. Join the developer waitlist and we will
        reach out when the SDK opens up.
      </p>
      <form id="waitlist">
        <input id="email" type="email" placeholder="you@yourteam.dev" autocomplete="email" required />
        <button id="submit" type="submit">Join the waitlist</button>
      </form>
      <p id="msg" class="msg" role="status" aria-live="polite"></p>
      <div class="foot">
        <span class="count" id="count"></span>
        <a href="https://status.bosphor.xyz">System status &rarr;</a>
      </div>
    </main>

    <script>
      // Same-origin: nginx proxies /public/* to the relayer, so no CORS.
      var form = document.getElementById('waitlist');
      var emailEl = document.getElementById('email');
      var btn = document.getElementById('submit');
      var msg = document.getElementById('msg');

      function setMsg(text, kind) {
        msg.textContent = text;
        msg.className = 'msg' + (kind ? ' ' + kind : '');
      }

      fetch('/public/waitlist/count')
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (d) {
          if (d && typeof d.count === 'number' && d.count > 0) {
            document.getElementById('count').textContent =
              d.count + ' developer' + (d.count === 1 ? '' : 's') + ' waitlisted';
          }
        })
        .catch(function () {});

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var email = emailEl.value.trim();
        if (!email) return;
        btn.disabled = true;
        setMsg('Submitting…');
        fetch('/public/waitlist', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, source: 'waitlist-page' }),
        })
          .then(function (r) { return r.json().then(function (b) { return { status: r.status, body: b }; }); })
          .then(function (res) {
            if (res.status === 200 && res.body && res.body.ok) {
              setMsg(res.body.created ? "You're on the list. We'll be in touch." : "You're already on the list.", 'ok');
              form.reset();
            } else if (res.status === 400) {
              setMsg('Please enter a valid email address.', 'err');
            } else {
              setMsg('Something went wrong. Please try again later.', 'err');
            }
          })
          .catch(function () { setMsg('Network error. Please try again.', 'err'); })
          .finally(function () { btn.disabled = false; });
      });
    </script>
  </body>
</html>
