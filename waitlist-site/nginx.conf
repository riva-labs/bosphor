# Serves the standalone waitlist page at waitlist.bosphor.xyz and reverse-proxies
# /public/* to the relayer on the same origin, so the signup form needs no CORS.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    # Proxy the public API to the relayer container (same compose network).
    location /public/ {
        proxy_pass http://relayer:3000/public/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
