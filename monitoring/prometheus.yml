global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: bosphor-relayer
    static_configs:
      - targets: ['relayer:3000']
    metrics_path: /metrics

  - job_name: bosphor-canary
    static_configs:
      - targets: ['canary:9300']
    metrics_path: /metrics
