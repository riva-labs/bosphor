apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    # Internal compose DNS, not the host-published port.
    url: http://prometheus:9090
    uid: bosphor-prometheus
    isDefault: true
    editable: false

  # Read-only access to the intent lifecycle store so Grafana can show the
  # per-intent, per-hop feed to operators/reviewers (internal only). Password is
  # injected from POSTGRES_PASSWORD in the grafana service environment.
  - name: Bosphor Postgres
    type: postgres
    access: proxy
    url: postgres:5432
    database: bosphor
    user: bosphor
    uid: bosphor-postgres
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      # Grafana 13 splits the SQL query editor into builder and code modes.
      # Builder mode needs a default database here or it errors with "you don't
      # have a default database configured" before any query runs. Keep it in
      # sync with the connection database above.
      database: bosphor
      sslmode: disable
      postgresVersion: 1600
    editable: false
