apiVersion: 1

providers:
  - name: bosphor
    orgId: 1
    folder: Bosphor
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      # Dashboard JSON lives alongside this provider file in the same mounted dir.
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
