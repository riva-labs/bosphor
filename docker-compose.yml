services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bosphor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bosphor}
      POSTGRES_DB: bosphor
    volumes:
      - bosphor-pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bosphor -d bosphor"]
      interval: 10s
      timeout: 5s
      retries: 5

  relayer:
    build: ./relayer
    env_file: .env
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  canary:
    build: ./canary
    env_file: .env
    restart: unless-stopped
    depends_on:
      - relayer

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      # Set GRAFANA_ADMIN_PASSWORD in .env for any non-local deployment. The
      # fallback exists only so a fresh clone boots for local dev.
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-bosphor}
      # Injected into the Bosphor Postgres datasource provisioning for the
      # internal intent-lifecycle table panel.
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-bosphor}
    volumes:
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  # Public status page (industry-standard, self-hosted). Serves the branded
  # "All Systems Operational" page + component health + uptime history at
  # status.bosphor.xyz via the Cloudflare tunnel. Configured through its own web
  # UI; state persists in the uptime-kuma-data volume.
  uptime-kuma:
    image: louislam/uptime-kuma:1
    volumes:
      - uptime-kuma-data:/app/data
    restart: unless-stopped

volumes:
  bosphor-pgdata:
  uptime-kuma-data:
