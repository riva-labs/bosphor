version: '3.8'

services:
  relayer:
    build: ./relayer
    env_file: .env
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  canary:
    build: ./canary
    env_file: .env
    restart: unless-stopped
    depends_on:
      - relayer

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=bosphor
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
